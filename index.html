<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List App</title>
    <link rel="icon" href="favicon-icon.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="todo-card" aria-label="To-do list app">
        <header class="app-header">
          <div>
            <p class="eyebrow">Plan your day</p>
            <h1>To-Do List</h1>
          </div>
          <div class="header-badge" id="taskCount">0 tasks</div>
        </header>

        <form id="taskForm" class="task-form">
          <div class="input-group">
            <label for="taskTitle">Task</label>
            <input
              id="taskTitle"
              name="taskTitle"
              type="text"
              placeholder="What needs to be done?"
              maxlength="80"
              required
            />
          </div>

          <div class="input-row">
            <div class="input-group">
              <label for="taskDate">Date</label>
              <input id="taskDate" name="taskDate" type="date" required />
            </div>

            <div class="input-group">
              <label for="taskTime">Time</label>
              <input id="taskTime" name="taskTime" type="time" required />
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" id="submitButton">Add Task</button>
            <button type="button" id="cancelEditButton" class="secondary-button hidden">
              Cancel Edit
            </button>
          </div>
          <p id="formMessage" class="form-message" aria-live="polite"></p>
        </form>

        <section class="task-list-section" aria-label="Task list">
          <div class="section-title-row">
            <h2>Your Tasks</h2>
            <span class="section-hint">Tap to manage your plan</span>
          </div>
          <ul id="taskList" class="task-list"></ul>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
